{% extends 'base.html' %}
{% block title %}Editar Registro{% endblock %}
{%block content%}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card welcome-card position-relative">
                <div class="card-body">
                    <div class="mb-4">
                        <h2 style="color: var(--primary-color);">Editar Registro</h2>
                    </div>

                    {% if messages %}
                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                        {% for message in messages %}
                            {{ message }}
                        {% endfor %}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endif %}

                    <form method="POST" action="{% url 'edit_record' registro.id %}">
                        {% csrf_token %}

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" name="first_name" value="{{ user.first_name }}" class="form-control" placeholder="Nombre">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Apellido</label>
                                <input type="text" name="last_name" value="{{ user.last_name }}" class="form-control" placeholder="Apellido">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" value="{{ user.email }}" class="form-control" placeholder="Correo electronico">
                        </div>

                        <hr class="my-4" style="border-color: var(--accent-color);">

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" name="telefono" value="{{ registro.telefono|default:'' }}" class="form-control" placeholder="Telefono (opcional)">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ciudad</label>
                            <input type="text" name="ciudad" value="{{ registro.ciudad|default:'' }}" class="form-control" placeholder="Ciudad (opcional)">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Direccion</label>
                            <input type="text" name="direccion" value="{{ registro.direccion|default:'' }}" class="form-control" placeholder="Direccion (opcional)">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-login">
                                Guardar Cambios
                            </button>
                        </div>
                    </form>

                    <div class="mt-3 text-center">
                        <a href="{% url 'home' %}" class="text-muted">Volver al Inicio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
